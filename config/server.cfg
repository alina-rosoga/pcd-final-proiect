# PCD T31 - Server Configuration File
# Format: libconfig (https://hyperrealm.github.io/libconfig/)
# Loaded at startup via config_loader.c

server:
{
    # Listening port for SOAP service
    port = 8080;

    # Maximum number of concurrent fork()ed worker processes
    max_workers = 4;

    # Directory where spectrogram output files are written
    output_dir = "./output";

    # SOAP service endpoint URL (informational; used in log messages)
    soap_endpoint = "http://localhost:8080/soap";

    # Log verbosity: 0 = silent, 1 = info, 2 = debug
    log_level = 1;
};

# LibrosaC DSP defaults (used when client sends 0 / unset values)
processing:
{
    default_sample_rate = 22050;
    default_n_fft       = 2048;
    default_hop_length  = 512;
    default_n_mels      = 128;
};
